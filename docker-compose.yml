services:
  jb-ai-proxy:
    image: ghcr.io/alisacat-s/jb-ai-proxy:latest
    container_name: jb-ai-proxy
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./config.json:/app/config.json
      - ./credentials.json:/app/credentials.json
    environment:
      - API_KEY=${API_KEY:-}
      - PANEL_PASSWORD=${PANEL_PASSWORD:-}
    mem_limit: 1g
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
